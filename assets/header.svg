<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="Tushar Khete - Generative AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.35" stop-color="#6D28D9"/>
      <stop offset="0.7" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
      <animate attributeName="x2" values="1;0.6;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="1;0.7;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6D28D9" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- animated wave layers -->
  <path fill="url(#wave1)" d="M0,180 C200,140 400,220 600,180 C800,140 1000,220 1200,180 L1200,260 L0,260 Z">
    <animate attributeName="d"
      values="M0,180 C200,140 400,220 600,180 C800,140 1000,220 1200,180 L1200,260 L0,260 Z;
              M0,190 C200,230 400,150 600,190 C800,230 1000,150 1200,190 L1200,260 L0,260 Z;
              M0,180 C200,140 400,220 600,180 C800,140 1000,220 1200,180 L1200,260 L0,260 Z"
      dur="9s" repeatCount="indefinite"/>
  </path>
  <path fill="url(#wave2)" d="M0,210 C250,180 450,240 700,210 C900,185 1050,235 1200,210 L1200,260 L0,260 Z">
    <animate attributeName="d"
      values="M0,210 C250,180 450,240 700,210 C900,185 1050,235 1200,210 L1200,260 L0,260 Z;
              M0,215 C250,245 450,185 700,215 C900,240 1050,190 1200,215 L1200,260 L0,260 Z;
              M0,210 C250,180 450,240 700,210 C900,185 1050,235 1200,210 L1200,260 L0,260 Z"
      dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- floating dots -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="150" cy="60" r="2.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="80" r="2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="200" r="2.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="200" r="2"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <text x="600" y="118" text-anchor="middle" font-family="'Segoe UI',Verdana,Helvetica,Arial,sans-serif" font-size="66" font-weight="800" fill="#ffffff" filter="url(#glow)" letter-spacing="2">
    Tushar Khete
    <animate attributeName="opacity" values="0;1" dur="1.4s" fill="freeze"/>
  </text>

  <!-- subtitle -->
  <text x="600" y="162" text-anchor="middle" font-family="'Fira Code','Segoe UI',monospace" font-size="21" font-weight="600" fill="#C9F7FF" letter-spacing="3">
    GENERATIVE AI ENGINEER
    <animate attributeName="opacity" values="0;0;1" dur="2.4s" fill="freeze"/>
  </text>

  <!-- underline accent -->
  <rect x="470" y="176" width="260" height="3" rx="2" fill="#06B6D4">
    <animate attributeName="width" values="0;260" dur="1.6s" fill="freeze"/>
    <animate attributeName="x" values="600;470" dur="1.6s" fill="freeze"/>
  </rect>
</svg>
